<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familiar — Quality Metrics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e0e0e8;
            min-height: 100vh;
        }
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #6b6b80;
            font-size: 0.9rem;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }
        .stat-card {
            background: linear-gradient(135deg, #13131a 0%, #1a1a28 100%);
            border: 1px solid #2a2a3d;
            border-radius: 16px;
            padding: 1.5rem 2.5rem;
            text-align: center;
            min-width: 160px;
        }
        .stat-value {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.3rem;
        }
        .stat-value.tests { color: #6c9eff; }
        .stat-value.coverage { color: #5de8a0; }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b6b80;
        }
        .stat-delta {
            font-size: 0.8rem;
            margin-top: 0.4rem;
        }
        .delta-up { color: #5de8a0; }
        .delta-down { color: #ff6b6b; }
        .delta-same { color: #6b6b80; }
        .chart-card {
            background: linear-gradient(135deg, #13131a 0%, #1a1a28 100%);
            border: 1px solid #2a2a3d;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .chart-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: #9090a8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        canvas { width: 100% !important; }
        .empty {
            text-align: center;
            padding: 4rem;
            color: #6b6b80;
            font-size: 1.1rem;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #3a3a4d;
            font-size: 0.75rem;
        }
        .footer a {
            color: #6b6b80;
            text-decoration: none;
        }
        .footer a:hover { color: #9090a8; }
        .updated {
            text-align: center;
            color: #3a3a4d;
            font-size: 0.75rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🐾</div>
            <h1>Familiar</h1>
            <p class="subtitle">Quality Metrics</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value tests" id="stat-tests">—</div>
                <div class="stat-label">Tests</div>
                <div class="stat-delta" id="delta-tests"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value coverage" id="stat-coverage">—</div>
                <div class="stat-label">Coverage</div>
                <div class="stat-delta" id="delta-coverage"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-loc" style="color: #c084fc;">—</div>
                <div class="stat-label">LOC</div>
                <div class="stat-delta" id="delta-loc"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-methods" style="color: #fb923c;">—</div>
                <div class="stat-label">Methods</div>
                <div class="stat-delta" id="delta-methods"></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-ccn" style="color: #f472b6;">—</div>
                <div class="stat-label">Avg CCN</div>
                <div class="stat-delta" id="delta-ccn"></div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-title">Tests & Coverage over time</div>
            <canvas id="chart" height="280"></canvas>
        </div>

        <div class="chart-card">
            <div class="chart-title">Codebase size over time</div>
            <canvas id="codeChart" height="240"></canvas>
        </div>

        <p class="updated" id="updated"></p>

        <div class="empty" id="empty-msg" style="display:none;">
            No metrics yet. Run <code>git push</code> to collect data.
        </div>

        <p class="footer">
            <a href="https://github.com/gscalzo/Familiar">github.com/gscalzo/Familiar</a>
        </p>
    </div>

    <script>
        fetch('history.json')
            .then(r => r.json())
            .then(data => {
                if (!data.length) {
                    document.getElementById('empty-msg').style.display = 'block';
                    return;
                }

                const labels = data.map(d => d.date);
                const tests = data.map(d => d.tests);
                const coverage = data.map(d => d.coverage);

                // Stats
                const latest = data[data.length - 1];
                document.getElementById('stat-tests').textContent = latest.tests;
                document.getElementById('stat-coverage').textContent = latest.coverage + '%';

                // Code metrics stats
                if (latest.loc != null) {
                    document.getElementById('stat-loc').textContent = latest.loc;
                    document.getElementById('stat-methods').textContent = latest.methods;
                }
                if (latest.avgComplexity != null) {
                    document.getElementById('stat-ccn').textContent = latest.avgComplexity;
                }

                // Deltas
                if (data.length > 1) {
                    const prev = data[data.length - 2];
                    const dt = latest.tests - prev.tests;
                    const dc = Math.round((latest.coverage - prev.coverage) * 100) / 100;
                    setDelta('delta-tests', dt, '');
                    setDelta('delta-coverage', dc, '%');
                    if (latest.loc != null && prev.loc != null) {
                        setDelta('delta-loc', latest.loc - prev.loc, '');
                        setDelta('delta-methods', latest.methods - prev.methods, '');
                    }
                    if (latest.avgComplexity != null && prev.avgComplexity != null) {
                        const dc = Math.round((latest.avgComplexity - prev.avgComplexity) * 100) / 100;
                        setDelta('delta-ccn', dc, '', true);
                    }
                }

                // Updated timestamp
                document.getElementById('updated').textContent =
                    'Last updated: ' + latest.date;

                // Combined chart
                new Chart(document.getElementById('chart'), {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            {
                                label: 'Tests',
                                data: tests,
                                borderColor: '#6c9eff',
                                backgroundColor: 'rgba(108, 158, 255, 0.08)',
                                fill: true,
                                tension: 0.35,
                                pointRadius: 5,
                                pointHoverRadius: 7,
                                pointBackgroundColor: '#6c9eff',
                                pointBorderColor: '#0a0a0f',
                                pointBorderWidth: 2,
                                borderWidth: 2.5,
                                yAxisID: 'y'
                            },
                            {
                                label: 'Coverage %',
                                data: coverage,
                                borderColor: '#5de8a0',
                                backgroundColor: 'rgba(93, 232, 160, 0.08)',
                                fill: true,
                                tension: 0.35,
                                pointRadius: 5,
                                pointHoverRadius: 7,
                                pointBackgroundColor: '#5de8a0',
                                pointBorderColor: '#0a0a0f',
                                pointBorderWidth: 2,
                                borderWidth: 2.5,
                                yAxisID: 'y1'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        interaction: {
                            mode: 'index',
                            intersect: false
                        },
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#9090a8',
                                    font: { family: 'Inter', size: 12 },
                                    usePointStyle: true,
                                    pointStyle: 'circle',
                                    padding: 20
                                }
                            },
                            tooltip: {
                                backgroundColor: '#1a1a28',
                                borderColor: '#2a2a3d',
                                borderWidth: 1,
                                titleColor: '#e0e0e8',
                                bodyColor: '#9090a8',
                                titleFont: { family: 'Inter', weight: '600' },
                                bodyFont: { family: 'Inter' },
                                padding: 12,
                                cornerRadius: 8,
                                displayColors: true
                            }
                        },
                        scales: {
                            x: {
                                ticks: {
                                    color: '#4a4a5d',
                                    font: { family: 'Inter', size: 11 },
                                    maxRotation: 45
                                },
                                grid: { color: '#1a1a28' }
                            },
                            y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                title: {
                                    display: true,
                                    text: 'Tests',
                                    color: '#6c9eff',
                                    font: { family: 'Inter', size: 11 }
                                },
                                ticks: {
                                    color: '#6c9eff',
                                    font: { family: 'Inter', size: 11 },
                                    stepSize: 10
                                },
                                grid: { color: '#1a1a28' },
                                beginAtZero: true
                            },
                            y1: {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                title: {
                                    display: true,
                                    text: 'Coverage %',
                                    color: '#5de8a0',
                                    font: { family: 'Inter', size: 11 }
                                },
                                ticks: {
                                    color: '#5de8a0',
                                    font: { family: 'Inter', size: 11 },
                                    callback: v => v + '%'
                                },
                                grid: { drawOnChartArea: false },
                                min: 0,
                                max: 100
                            }
                        }
                    }
                });
                // Codebase size chart (only if LOC data exists)
                const locData = data.filter(d => d.loc != null);
                if (locData.length > 0) {
                    new Chart(document.getElementById('codeChart'), {
                        type: 'line',
                        data: {
                            labels: locData.map(d => d.date),
                            datasets: [
                                {
                                    label: 'LOC',
                                    data: locData.map(d => d.loc),
                                    borderColor: '#c084fc',
                                    backgroundColor: 'rgba(192, 132, 252, 0.08)',
                                    fill: true,
                                    tension: 0.35,
                                    pointRadius: 5,
                                    pointBackgroundColor: '#c084fc',
                                    pointBorderColor: '#0a0a0f',
                                    pointBorderWidth: 2,
                                    borderWidth: 2.5,
                                    yAxisID: 'y'
                                },
                                {
                                    label: 'Methods',
                                    data: locData.map(d => d.methods),
                                    borderColor: '#fb923c',
                                    backgroundColor: 'rgba(251, 146, 60, 0.08)',
                                    fill: true,
                                    tension: 0.35,
                                    pointRadius: 5,
                                    pointBackgroundColor: '#fb923c',
                                    pointBorderColor: '#0a0a0f',
                                    pointBorderWidth: 2,
                                    borderWidth: 2.5,
                                    yAxisID: 'y1'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            interaction: { mode: 'index', intersect: false },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: '#9090a8',
                                        font: { family: 'Inter', size: 12 },
                                        usePointStyle: true,
                                        pointStyle: 'circle',
                                        padding: 20
                                    }
                                },
                                tooltip: {
                                    backgroundColor: '#1a1a28',
                                    borderColor: '#2a2a3d',
                                    borderWidth: 1,
                                    titleColor: '#e0e0e8',
                                    bodyColor: '#9090a8',
                                    padding: 12,
                                    cornerRadius: 8
                                }
                            },
                            scales: {
                                x: {
                                    ticks: { color: '#4a4a5d', font: { family: 'Inter', size: 11 } },
                                    grid: { color: '#1a1a28' }
                                },
                                y: {
                                    position: 'left',
                                    title: { display: true, text: 'LOC', color: '#c084fc', font: { family: 'Inter', size: 11 } },
                                    ticks: { color: '#c084fc', font: { family: 'Inter', size: 11 } },
                                    grid: { color: '#1a1a28' },
                                    beginAtZero: true
                                },
                                y1: {
                                    position: 'right',
                                    title: { display: true, text: 'Methods', color: '#fb923c', font: { family: 'Inter', size: 11 } },
                                    ticks: { color: '#fb923c', font: { family: 'Inter', size: 11 } },
                                    grid: { drawOnChartArea: false },
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                } else {
                    document.getElementById('codeChart').parentElement.style.display = 'none';
                }
            })
            .catch(() => {
                document.getElementById('empty-msg').style.display = 'block';
            });

        function setDelta(id, value, suffix, lowerIsBetter) {
            const el = document.getElementById(id);
            if (value > 0) {
                el.textContent = '+' + value + suffix;
                el.className = 'stat-delta ' + (lowerIsBetter ? 'delta-down' : 'delta-up');
            } else if (value < 0) {
                el.textContent = value + suffix;
                el.className = 'stat-delta ' + (lowerIsBetter ? 'delta-up' : 'delta-down');
            } else {
                el.textContent = '—';
                el.className = 'stat-delta delta-same';
            }
        }
    </script>
</body>
</html>

included:
  - Familiar
  - FamiliarTests

excluded:
  - .build
  - DerivedData
  - build

disabled_rules:
  - trailing_comma
  - todo

opt_in_rules:
  - closure_spacing
  - empty_count
  - explicit_init
  - force_unwrapping
  - implicit_return
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_imports
  - vertical_whitespace_closing_braces

force_unwrapping:
  severity: warning

line_length:
  warning: 130
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

type_name:
  min_length: 2

identifier_name:
  min_length: 2
  excluded:
    - x
    - y
    - dx
    - dy
    - id
    - sm
    - dt
    - ch
    - hp
    - ms
